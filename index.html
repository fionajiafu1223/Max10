<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Freed</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; }
canvas { position:fixed; inset:0; display:block; }

#hero-text {
  position:fixed; z-index:10;
  text-align:center; pointer-events:none;
  left:50%; top:42%;
  transform:translate(-50%,-50%);
}
#hero-text .line1 {
  font-family:'Josefin Sans',sans-serif;
  font-weight:300; font-size:0.60rem;
  letter-spacing:0.20em; font-style:italic;
  color:rgba(220,245,255,0.88);
  line-height:1;
}
#hero-text .line2 {
  font-family:'Josefin Sans',sans-serif;
  font-weight:300; font-size:0.60rem;
  letter-spacing:0.22em; font-style:italic;
  color:rgba(220,245,255,0.88);
  margin-top:5px; line-height:1;
}
#hero-text h1 {
  font-family:'Josefin Sans',sans-serif;
  font-weight:700; font-size:2.4rem;
  letter-spacing:0.15em;
  color:rgba(235,250,255,0.96);
  margin-top:7px; line-height:1;
  text-shadow: 0 0 40px rgba(100,220,255,0.55), 0 2px 16px rgba(0,80,140,0.35);
}

.being {
  position:fixed; bottom:34px; left:0; right:0;
  text-align:center; z-index:10; pointer-events:none;
}
.being span {
  font-family:'Noto Serif SC',serif;
  font-size:0.55rem; font-weight:300;
  letter-spacing:0.12em; color:rgba(200,235,255,0.38);
}
@font-face {
  font-family: 'ITC Bauhaus';
  font-weight: 500;
  src: url('./ITC%20Bauhaus%20Medium.ttf') format('truetype');
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Josefin+Sans:ital,wght@0,700;0,900;1,700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="c"></canvas>
<div id="hero-text">

  <div class="line1">Releasing is part of life</div>
  <div class="line2">until</div>
  <h1>Freed</h1>
</div>
<div class="being"><span>Be not the doer, get everything only by releasing.</span></div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ── BACKGROUND ──
function drawBg() {
  // deep ocean gradient — dark at bottom, light rays from top
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0.00, '#c2ecf8');  // surface light
  bg.addColorStop(0.25, '#8ed4ee');
  bg.addColorStop(0.55, '#4aaed8');
  bg.addColorStop(0.80, '#1a7ab5');
  bg.addColorStop(1.00, '#0d4870');  // deep dark
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);
}

// ── LIGHT RAYS from surface ──
function drawRays(t) {
  ctx.save();
  const rayColors = [
    'rgba(180,240,255,0.04)',
    'rgba(160,230,255,0.03)',
    'rgba(200,245,255,0.035)',
  ];
  const rays = [
    {x:0.25, width:0.12, drift:0.015},
    {x:0.45, width:0.08, drift:-0.010},
    {x:0.62, width:0.14, drift:0.012},
    {x:0.80, width:0.07, drift:-0.008},
    {x:0.15, width:0.06, drift:0.018},
  ];
  rays.forEach((r, i) => {
    const cx = (r.x + Math.sin(t*0.3 + i) * r.drift) * W;
    const hw = r.width * W * 0.5;
    const grad = ctx.createLinearGradient(0, 0, 0, H*0.75);
    grad.addColorStop(0,   rayColors[i % rayColors.length].replace('0.04', String(0.055 + Math.sin(t*0.4+i)*0.015)));
    grad.addColorStop(0.6, rayColors[i % rayColors.length]);
    grad.addColorStop(1,   'rgba(180,240,255,0)');
    ctx.beginPath();
    ctx.moveTo(cx - hw*0.2, 0);
    ctx.lineTo(cx + hw*0.2, 0);
    ctx.lineTo(cx + hw, H*0.75);
    ctx.lineTo(cx - hw, H*0.75);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  });
  ctx.restore();
}

// ── CAUSTICS (wavy light patterns on sea floor) ──
function drawCaustics(t) {
  ctx.save();
  ctx.globalAlpha = 0.06;
  for (let i = 0; i < 8; i++) {
    const x = (0.1 + i*0.12 + Math.sin(t*0.5+i)*0.04) * W;
    const y = H*0.88 + Math.sin(t*0.6+i*1.3)*12;
    const r = (20 + Math.sin(t*0.4+i)*8);
    const g = ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,'rgba(180,240,255,0.8)');
    g.addColorStop(1,'rgba(180,240,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── BUBBLE CLASS ──
class Bubble {
  constructor(fromBottom) {
    this.reset(fromBottom);
  }

  reset(startAtBottom) {
    this.x    = Math.random() * W;
    this.y    = startAtBottom ? H + 20 + Math.random()*100 : Math.random() * H;
    this.r    = 2 + Math.random() * 22;        // wide size range
    this.vy   = -(0.4 + Math.random() * 1.2);  // upward speed
    this.vx   = 0;
    this.wobbleAmp   = 0.4 + Math.random() * 1.2;
    this.wobbleFreq  = 0.8 + Math.random() * 1.5;
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.opacity = 0.25 + Math.random() * 0.55;
    this.life    = 0;
    this.maxLife = (H + 200) / Math.abs(this.vy) * (0.7 + Math.random()*0.5);
    // slight speed variation
    this.vy *= (0.8 + this.r / 30);
  }

  update(t) {
    this.life++;
    // wobbly horizontal drift — classic bubble sway
    this.x += Math.sin(t * this.wobbleFreq + this.wobblePhase) * this.wobbleAmp;
    this.y += this.vy;

    // fade in at bottom, fade out at top
    const progress = this.life / this.maxLife;
    if (progress < 0.08) {
      this.opacity = (progress / 0.08) * (0.25 + Math.random()*0.01);
    } else if (progress > 0.85) {
      this.opacity *= 0.97;
    }

    if (this.y < -this.r * 3 || this.life > this.maxLife) {
      this.reset(true);
    }
  }

  draw() {
    const x = this.x, y = this.y, r = this.r;
    const a = this.opacity;

    // outer soft glow
    const glow = ctx.createRadialGradient(x,y,r*0.4,x,y,r*2.2);
    glow.addColorStop(0, `rgba(180,240,255,${a*0.18})`);
    glow.addColorStop(1, `rgba(100,200,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r*2.2,0,Math.PI*2);
    ctx.fillStyle=glow; ctx.fill();

    // glass shell — transparent, just rim
    const shell = ctx.createRadialGradient(x-r*0.32,y-r*0.32,r*0.01, x,y,r);
    shell.addColorStop(0.00, `rgba(255,255,255,${a*0.70})`);
    shell.addColorStop(0.12, `rgba(255,255,255,${a*0.18})`);
    shell.addColorStop(0.55, `rgba(160,230,255,${a*0.06})`);
    shell.addColorStop(0.82, `rgba(100,200,240,${a*0.12})`);
    shell.addColorStop(1.00, `rgba(140,210,255,${a*0.22})`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=shell; ctx.fill();

    // rim ring — thin bright edge
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.strokeStyle = `rgba(200,240,255,${a*0.45})`;
    ctx.lineWidth = Math.max(0.5, r*0.06);
    ctx.stroke();

    // primary specular
    const sp = ctx.createRadialGradient(x-r*0.35,y-r*0.35,0,x-r*0.30,y-r*0.30,r*0.32);
    sp.addColorStop(0, `rgba(255,255,255,${a*0.85})`);
    sp.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=sp; ctx.fill();

    // tiny secondary shimmer
    const sp2 = ctx.createRadialGradient(x+r*0.38,y+r*0.30,0,x+r*0.38,y+r*0.30,r*0.14);
    sp2.addColorStop(0, `rgba(255,255,255,${a*0.38})`);
    sp2.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=sp2; ctx.fill();
  }
}

// create bubbles — some start mid-screen so it's not empty at load
const BUBBLES = Array.from({length: 55}, (_, i) => new Bubble(i > 20));

// hero bubble — large, center, also rising slowly
const HERO = {
  x: 0, y: 0, r: 0,
  phase: 0,
};

function drawHeroBubble(x, y, r, t) {
  // large hero glow
  const glow = ctx.createRadialGradient(x,y,r*0.3,x,y,r*2.0);
  glow.addColorStop(0, 'rgba(140,220,255,0.18)');
  glow.addColorStop(1, 'rgba(80,180,255,0)');
  ctx.beginPath(); ctx.arc(x,y,r*2.0,0,Math.PI*2);
  ctx.fillStyle=glow; ctx.fill();

  // shell
  const shell = ctx.createRadialGradient(x-r*0.30,y-r*0.30,r*0.01,x,y,r);
  shell.addColorStop(0.00, 'rgba(255,255,255,0.08)');
  shell.addColorStop(0.12, 'rgba(255,255,255,0.04)');
  shell.addColorStop(0.45, 'rgba(160,230,255,0.10)');
  shell.addColorStop(0.80, 'rgba(100,200,240,0.15)');
  shell.addColorStop(1.00, 'rgba(140,215,255,0.28)');
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=shell; ctx.fill();

  // rim
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,245,255,0.55)';
  ctx.lineWidth=1.5; ctx.stroke();

  // specular — soft ellipse upper-left, light coming from top-left
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
  ctx.translate(x - r*0.28, y - r*0.58);
  ctx.rotate(-0.5);
  ctx.scale(1, 0.60);
  const spg = ctx.createRadialGradient(0,0,0,0,0,r*0.38);
  spg.addColorStop(0,   'rgba(255,255,255,0.62)');
  spg.addColorStop(0.5, 'rgba(255,255,255,0.18)');
  spg.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.fillStyle=spg;
  ctx.beginPath(); ctx.arc(0,0,r*0.38,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

const heroEl = document.getElementById('hero-text');
let t = 0;

function draw() {
  requestAnimationFrame(draw);
  t += 0.012;

  drawBg();
  drawRays(t);
  drawCaustics(t);

  // update & draw bubbles (small ones behind hero)
  BUBBLES.forEach(b => { b.update(t); b.draw(); });

  // hero bubble — gentle bob
  const heroR = Math.min(W,H) * 0.18;
  const heroX = W*0.50 + Math.sin(t*0.28)*6;
  const heroY = H*0.42 + Math.sin(t*0.38)*10;
  heroEl.style.left = heroX+'px';
  heroEl.style.top  = heroY+'px';
  drawHeroBubble(heroX, heroY, heroR, t);
}

draw();
</script>
</body>
</html>
